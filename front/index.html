<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explorador de Notas 3D</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.132.2/build/three.module.js",
                "three/examples/jsm/": "https://cdn.jsdelivr.net/npm/three@0.132.2/examples/jsm/",
                "d3-force-3d": "https://cdn.jsdelivr.net/npm/d3-force-3d@3.0.5/+esm",
                "treslib/GrainEngine":  "https://cdn.jsdelivr.net/npm/treslib@1.8.0/src/GrainEngine.js",
                "treslib/SnapToGrains": "https://cdn.jsdelivr.net/npm/treslib@1.8.0/src/SnapToGrains.js"
            }
        }
    </script>
</head>
<body>
    <div id="welcome-modal">
        <div id="welcome-modal-inner">
            <div id="welcome-content"></div>
            <button id="welcome-enter">EXPLORAR</button>
        </div>
    </div>
    <div id="scene-container"></div>
    <div id="note-display-overlay">
        <h2 id="overlay-title">Selecciona una nota</h2>
        <div id="overlay-content"></div>
        <button id="close-overlay">X</button>
    </div>
    <div id="loading-screen">Cargando escena...</div>

    <nav id="sidebar">
        <div id="sidebar-header">
            <span id="sidebar-title">TRES ESTUDIOS</span>
            <span id="sidebar-subtitle">SISTEMA DE EXPLORACIÓN</span>
        </div>

        <div class="sb-section">
            <div class="sb-label">[ VIS ]</div>
            <div class="sb-controls">
                <button id="toggle-references">REFS: ON</button>
            </div>
        </div>

        <div class="sb-section">
            <div class="sb-label">[ AUD ]</div>
            <div class="sb-controls">
                <button id="toggle-grain">GRAIN: ON</button>
            </div>
        </div>

        <div class="sb-section sb-section--dat">
            <div class="sb-label">[ DAT ]</div>
            <canvas id="snapshot-canvas"></canvas>
            <div id="snapshot-data">
                <div class="snap-row"><span class="snap-key">bright</span><span class="snap-val" id="val-brightness">—</span></div>
                <div class="snap-row"><span class="snap-key">contrast</span><span class="snap-val" id="val-contrast">—</span></div>
                <div class="snap-row"><span class="snap-key">complex</span><span class="snap-val" id="val-complexity">—</span></div>
            </div>
        </div>
    </nav>

    <script src="https://cdn.jsdelivr.net/npm/@tweenjs/tween.js@18.6.4/dist/tween.umd.min.js"></script>
    <script type="module" src="main.js"></script>
</body>
</html>
